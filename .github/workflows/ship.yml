# Check on every push/PR; ship to production on main. No staging — the lab
# is the stage. Quality gate mirrors `just check` exactly.
name: ship

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # rust-toolchain.toml pins the nightly + components; `rustup show`
      # triggers the auto-install.
      - name: Install pinned toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: just,trunk,cargo-nextest
      - name: fmt + clippy (native & wasm) + tests
        run: just check

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: just,trunk
      - name: Build (threaded wasm, release)
        run: just build
      - name: Browser smoke — boot, play, persist, resume
        run: node scripts/smoke.mjs
        env:
          CHROME_PATH: /usr/bin/google-chrome

  ship:
    needs: [check, smoke]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: just,trunk
      - name: Build (threaded wasm, release)
        run: just build
      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # v3's default is wrangler 3.x, which uploads _headers as a plain
          # asset instead of applying it — killing COOP/COEP and therefore
          # SharedArrayBuffer/audio. Wrangler 4 required.
          wranglerVersion: "4"
